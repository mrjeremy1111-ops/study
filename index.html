<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>學習專區 | 深度專注模式</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --primary: #6366f1; --accent: #10b981; --danger: #ef4444; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #818cf8; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; transition: background 0.5s; -webkit-tap-highlight-color: transparent; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 92%; max-width: 600px; padding: 20px 10px; }
        .glass-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); border: 1px solid rgba(226,232,240,0.6); position: relative; }
        .timer-display { font-family: 'Courier New', monospace; font-size: 64px; font-weight: 800; margin: 10px 0; text-align: center; color: var(--primary); }
        .timer-over { color: var(--danger) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        input { background: var(--bg); color: var(--text); border: 1.5px solid #e2e8f0; padding: 12px; border-radius: 12px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; padding: 15px; border-radius: 15px; font-weight: 700; border: none; cursor: pointer; font-size: 16px; margin-top: 5px; }
        .ai-portal { background: #000; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 15px; padding: 18px; border-radius: 15px; font-weight: bold; margin: 20px 0; border: 1px solid #334155; }
        
        /* 懸浮返回按鈕：解決 Scriptable 回不來的痛點 */
        #floating-back {
            position: fixed; top: 30px; left: 20px; z-index: 10000;
            background: rgba(15, 23, 42, 0.9); color: white;
            padding: 12px 20px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(8px); display: none; cursor: pointer;
        }
    </style>
</head>
<body data-theme="dark">

<div id="floating-back" onclick="goHome()">← 返回計時器</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <span style="font-weight: 900; font-size: 26px;">🧠 學習專區</span>
        <button onclick="toggleTheme()" style="background:none; border:none; font-size:24px;">🌓</button>
    </div>

    <div class="glass-card" style="text-align: center;">
        <div id="total-stat" style="font-weight:bold; color:var(--primary); font-size: 18px;">今日累積專注：0 分 0 秒</div>
    </div>

    <div class="glass-card">
        <input type="text" id="taskName" placeholder="現在要專注做什麼？">
        <div style="display:flex; gap:10px; align-items:center; margin-bottom: 10px;">
            <input type="number" id="minInput" value="25" style="width:80px;"> 分
            <input type="number" id="secInput" value="0" style="width:80px;"> 秒
        </div>
        <button class="btn-primary" onclick="addTask()">建立專注任務</button>
    </div>

    <div id="taskList"></div>

    <div style="margin-top: 30px; opacity: 0.6; font-size: 12px; font-weight: bold; letter-spacing: 1px;">學習輔助工具</div>
    <a href="https://gemini.google.com/" class="ai-portal" onclick="savePreLeaveState()">
        ✨ 啟動 AI 智慧查詢 (Gemini)
    </a>

    <textarea id="notes" placeholder="隨手筆記..." oninput="saveData()" style="width:100%; height:150px; border-radius:20px; padding:15px; border:none; background:#1e293b; color:#fff; font-size:16px; box-sizing:border-box;"></textarea>
</div>

<audio id="alarm"><source src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" type="audio/mpeg"></audio>

<script>
    let tasks = [];
    let timerInterval = null;
    const GITHUB_URL = window.location.origin + window.location.pathname;

    window.onload = () => {
        tasks = JSON.parse(localStorage.getItem('study_tasks')) || [];
        document.getElementById('notes').value = localStorage.getItem('study_notes') || "";
        if(localStorage.getItem('theme') === 'light') document.body.removeAttribute('data-theme');
        
        syncTime(); // 返回時自動校正
        render();
        startGlobalTick();
    };

    // 核心邏輯：監測是否在 Gemini 頁面
    setInterval(() => {
        const backBtn = document.getElementById('floating-back');
        if (!window.location.href.includes(GITHUB_URL) && !window.location.href.includes('index.html')) {
            backBtn.style.display = 'block';
        } else {
            backBtn.style.display = 'none';
        }
    }, 1000);

    function goHome() {
        savePreLeaveState();
        window.location.href = GITHUB_URL;
    }

    function savePreLeaveState() {
        if (tasks.some(t => t.running)) {
            localStorage.setItem('leave_time', Date.now().toString());
        }
        localStorage.setItem('study_tasks', JSON.stringify(tasks));
    }

    function syncTime() {
        const leaveTime = localStorage.getItem('leave_time');
        if (leaveTime && tasks.some(t => t.running)) {
            const diff = Math.floor((Date.now() - parseInt(leaveTime)) / 1000);
            tasks.forEach(t => {
                if (t.running) {
                    t.remain -= diff;
                    t.spent += diff;
                }
            });
            localStorage.removeItem('leave_time');
        }
    }

    function startGlobalTick() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let changed = false;
            tasks.forEach(t => {
                if (t.running) {
                    t.remain--;
                    t.spent++;
                    changed = true;
                    if (t.remain === 0) document.getElementById('alarm').play();
                }
            });
            if (changed) {
                render();
                localStorage.setItem('study_tasks', JSON.stringify(tasks));
            }
        }, 1000);
    }

    function addTask() {
        const name = document.getElementById('taskName').value || "未命名任務";
        const sec = (parseInt(document.getElementById('minInput').value || 0) * 60) + parseInt(document.getElementById('secInput').value || 0);
        tasks.push({ id: Date.now(), name, remain: sec, spent: 0, running: false });
        render(); saveData();
    }

    function toggle(id) {
        tasks.forEach(t => {
            if (t.id === id) t.running = !t.running;
            else t.running = false; // 一次只能跑一個
        });
        render(); saveData();
    }

    function render() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        let totalSpent = 0;
        tasks.forEach(t => {
            totalSpent += t.spent;
            const isOver = t.remain < 0;
            const absRem = Math.abs(t.remain);
            const card = document.createElement('div');
            card.className = 'glass-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>${t.name}</span><span onclick="del(${t.id})" style="color:#94a3b8">✕</span></div>
                <div class="timer-display ${isOver?'timer-over':''}">${isOver?'-':''}${Math.floor(absRem/60)}:${(absRem%60).toString().padStart(2,'0')}</div>
                <button class="btn-primary" style="background:${t.running?'#94a3b8':''}" onclick="toggle(${t.id})">${t.running?'暫停中':'開始專注'}</button>
            `;
            list.appendChild(card);
        });
        document.getElementById('total-stat').innerText = `今日累積專注：${Math.floor(totalSpent/60)} 分 ${totalSpent%60} 秒`;
    }

    function del(id) { tasks = tasks.filter(t => t.id !== id); render(); saveData(); }
    function saveData() { 
        localStorage.setItem('study_tasks', JSON.stringify(tasks)); 
        localStorage.setItem('study_notes', document.getElementById('notes').value);
    }
    function toggleTheme() {
        document.body.getAttribute('data-theme') ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', document.body.getAttribute('data-theme') || 'light');
    }
</script>
</body>
</html>
